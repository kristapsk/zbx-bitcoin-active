zabbix_export:
  version: '7.4'
  template_groups:
    - uuid: 4abff66c37be497fb75bdce929c04e3e
      name: Templates/Applications
  templates:
    - uuid: d67af95f877a43b7bced22df4378a045
      template: 'bitcoind by Zabbix agent active'
      name: 'bitcoind by Zabbix agent active'
      groups:
        - name: Templates/Applications
      items:
        - uuid: 75b66d9eb85b41e0b8a9e4c33e8871c6
          name: 'Bitcoin: Estimated size of the block and undo files on disk'
          type: DEPENDENT
          key: bitcoin.blockchain.size_on_disk
          units: B
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.blockchain.size_on_disk
          master_item:
            key: bitcoin.status
          tags:
            - tag: component
              value: storage
        - uuid: d5bc76a09d844015a5948031197d28ec
          name: 'Bitcoin: Height of the most-work fully-validated chain'
          type: DEPENDENT
          key: bitcoin.blockchain.tip.blocks
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.blockchain.tip.blocks
          master_item:
            key: bitcoin.status
          triggers:
            - uuid: b63f986f65cb427fba12e0cb477d794d
              expression: 'changecount(/bitcoind by Zabbix agent active/bitcoin.blockchain.tip.blocks,3h)=0'
              name: 'Validated blockchain tip hasn''t changed for 3 hours'
              priority: WARNING
              manual_close: 'YES'
        - uuid: 0dc938704263476d850538e83c54b3cb
          name: 'Bitcoin: Current number of headers validated'
          type: DEPENDENT
          key: bitcoin.blockchain.tip.headers
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.blockchain.tip.headers
          master_item:
            key: bitcoin.status
        - uuid: b846f4da21e047339c71acd4d181e888
          name: 'Bitcoin: Estimate of blockchain verification progress'
          type: DEPENDENT
          key: bitcoin.blockchain.verificationprogress
          value_type: FLOAT
          units: '%'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.blockchain.verificationprogress
            - type: MULTIPLIER
              parameters:
                - '100'
          master_item:
            key: bitcoin.status
        - uuid: a7aff7709c2e4ccaa4a098141ad65baa
          name: 'Bitcoin: Node connection count'
          type: DEPENDENT
          key: bitcoin.connections.num
          description: 'Number of P2P connections to other nodes.'
          preprocessing:
            - type: JSONPATH
              parameters:
                - $.network.connections
          master_item:
            key: bitcoin.status
          tags:
            - tag: component
              value: connections
        - uuid: 2656a64ecc60481f8756a5843f145ae8
          name: 'Bitcoin: Node incoming connection count'
